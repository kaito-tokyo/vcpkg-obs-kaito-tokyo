name: Finalize ciproxy
author: Kaito Udagawa <umireon@kaito.tokyo>
description: Stop ciproxy for vcpkg binary caching and upload packages to the storage

inputs:
  master-token:
    description: "Long-term master token"
    required: true
  ciproxy-port:
    description: "Port that ciproxy is listening on"
    required: true
  ciproxy-dir:
    description: "Directory of ciproxy"
    required: true
  ciproxy-pid:
    description: "PID of the running ciproxy"
    required: true
  short-hash-length:
    description: "Length of the short hash to be used in the filename"
    required: false
    default: "8"

runs:
  using: composite
  steps:
    - name: Signal ciproxy to shutdown
      shell: bash --noprofile --norc -uo pipefail {0}
      env:
        CIPROXY_PORT: ${{ inputs.ciproxy-port }}
      run: curl -fsS -X X-CIPROXY-SHUTDOWN "http://127.0.0.1:$CIPROXY_PORT/"

    - name: Ensure to stop ciproxy (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      working-directory: ${{ inputs.ciproxy-dir }}
      env:
        CIPROXY_PID: ${{ inputs.ciproxy-pid }}
      run: |
        $pid = [int]$env:CIPROXY_PID

        for ($i = 0; $i -lt 10; $i++) {
          if (-not (Get-Process -Id $pid -ErrorAction SilentlyContinue)) {
            Write-Output "Ciproxy gracefully exited."
            exit 0
          }
          Start-Sleep -Seconds 3
        }

        Write-Error "ERROR: Ciproxy did not stop after 30 seconds!"
        exit 1

    - name: Ensure to stop ciproxy (Non-Windows)
      if: runner.os != 'Windows'
      shell: bash --noprofile --norc -uo pipefail {0}
      working-directory: ${{ inputs.ciproxy-dir }}
      env:
        CIPROXY_PID: ${{ inputs.ciproxy-pid }}
      run: |
        count=0
        while kill -0 "$CIPROXY_PID" 2> /dev/null; do
          ps -p "$CIPROXY_PID"
          if [[ "$count" -ge 10 ]]; then
            echo "ERROR: Ciproxy did not stop after 30 seconds!"
            exit 1
          fi
          sleep 3
          count=$((count+1))
        done

        echo "Ciproxy gracefully exited."

    - name: Check if vcpkg artifacts exist
      id: check-artifacts
      shell: bash --noprofile --norc -euo pipefail {0}
      working-directory: ${{ inputs.ciproxy-dir }}
      run: |
        if [[ -d vcpkg_artifacts ]] && [ -n "$(ls -A vcpkg_artifacts)" ]; then
          echo "exists=true" >> "$GITHUB_OUTPUT"
          ls -lA vcpkg_artifacts
        else
          echo "exists=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Attest vcpkg artifacts
      id: attest
      if: steps.check-artifacts.outputs.exists == 'true'
      uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
      with:
        subject-path: ciproxy/vcpkg_artifacts/*

    - name: Upload build provenance of vcpkg artifacts to CDN
      if: steps.check-artifacts.outputs.exists == 'true'
      shell: bash --noprofile --norc -euo pipefail {0}
      working-directory: ${{ inputs.ciproxy-dir }}
      env:
        MASTER_TOKEN: ${{ inputs.master-token }}
        JOB_ID: ${{ github.job }}
        BUNDLE_PATH: ${{ steps.attest.outputs.bundle-path }}
        SHORT_HASH_LENGTH: ${{ inputs.short-hash-length }}
      run: |
        jq -c . "$BUNDLE_PATH" > attestation.jsonl

        FULL_HASH=$(sha256sum attestation.jsonl | awk '{print $1}')
        SHORT_HASH=${FULL_HASH:0:$SHORT_HASH_LENGTH}
        FILENAME="${GITHUB_REPOSITORY/\//@}@$GITHUB_RUN_ID@$GITHUB_RUN_ATTEMPT@$GITHUB_JOB@$SHORT_HASH.jsonl"
        echo "Uploading $FILENAME"

        ACCESS_TOKEN=$(curl -fsS -X POST -d "master_token=$MASTER_TOKEN" https://readwrite.vcpkg-obs.kaito.tokyo/token)
        printf "::add-mask::%s\n" "$ACCESS_TOKEN"

        curl -fsSL \
          -X PUT \
          -H "Authorization: Bearer $ACCESS_TOKEN" \
          -H "Content-Type: application/x-ndjson" \
          -H "Cache-Control: public, max-age=86400" \
          -T ./attestation.jsonl \
          "https://readwrite.vcpkg-obs.kaito.tokyo/_sigstore/$FILENAME"

    - name: Upload vcpkg artifacts to CDN
      if: steps.check-artifacts.outputs.exists == 'true'
      shell: bash --noprofile --norc -euo pipefail {0}
      working-directory: ${{ inputs.ciproxy-dir }}
      run: awk 'FNR==1 && NR!=1 {print "next"} {print}' vcpkg_curlscripts/* | curl -Z -fsS -K -
