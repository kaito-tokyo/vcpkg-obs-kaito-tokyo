name: Standalone

on:
  push:
    branches: [main]
  schedule:
    - cron: 23 9 * * *
  workflow_dispatch:

permissions:
  attestations: write
  contents: read
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CIPROXY_PORT: "8080"
  DEVELOPER_DIR: /Applications/Xcode_16.4.app
  HOMEBREW_NO_ANALYTICS: "1"
  HOMEBREW_NO_AUTO_UPDATE: "1"
  HOMEBREW_NO_ENV_HINTS: "1"
  HOMEBREW_NO_INSTALL_CLEANUP: "1"
  VCPKG_BINARY_SOURCES: clear;http,http://localhost:8080/{name}/{version}/{sha},readwrite

jobs:
  build-windows-x64:
    name: Build vcpkg for windows-x64-static-md-obs

    runs-on: windows-2022
    timeout-minutes: 180
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go for ciproxy
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: ciproxy/go.mod

      - name: Extract vcpkg configuration
        id: vcpkg-configuration
        uses: ./.github/actions/extract-vcpkg-configuration
        with:
          path: vcpkg-configuration.json

      - name: Checkout vcpkg
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: microsoft/vcpkg
          ref: ${{ steps.vcpkg-configuration.outputs.DEFAULT_REGISTRY_BASELINE }}
          path: vcpkg
          filter: "blob:none"

      - name: Run bootstrap-vcpkg.bat
        shell: pwsh
        run: ./vcpkg/bootstrap-vcpkg.bat

      - name: Export clean env file for vcpkg (Windows)
        shell: bash --noprofile --norc -euo pipefail {0}
        run: |
          (
            printf 'declare -x "ProgramFiles(x86)"=%q\n' "$(cygpath -u "$(printenv "ProgramFiles(x86)" | head -n 1)")")"
            printf 'declare -x PROGRAMFILES=%q\n' "$(cygpath -u "$PROGRAMFILES")"
            printf 'declare -x LOCALAPPDATA=%q\n' "$(cygpath -u "$LOCALAPPDATA")"
            printf 'declare -x PROCESSOR_ARCHITECTURE=%q\n' "$PROCESSOR_ARCHITECTURE"
            printf 'declare -x ProgramW6432=%q\n' "$(cygpath -u "$ProgramW6432")"
            printf 'declare -x SYSTEMDRIVE=%q\n' "$(cygpath -u "$SYSTEMDRIVE")"
            printf 'declare -x SYSTEMROOT=%q\n' "$(cygpath -u "$SYSTEMROOT")"
            printf 'declare -x TEMP=%q\n' "$(cygpath -u "$TEMP")"
            printf 'declare -x TMP=%q\n' "$(cygpath -u "$TMP")"
            printf 'declare -x USERPROFILE=%q\n' "$(cygpath -u "$USERPROFILE")"
            printf 'declare -x WINDIR=%q\n' "$(cygpath -u "$WINDIR")"

            printf 'declare -x PATH=%q\n' "/usr/bin:/c/Windows/system32:/c/Windows"
            printf 'declare -x VCPKG_BINARY_SOURCES=%q\n' "$VCPKG_BINARY_SOURCES"
            printf 'declare -x VCPKG_ROOT=%q\n' "$(cygpath -u "$GITHUB_WORKSPACE/vcpkg")"
          ) > .bashenv_vcpkg

      - name: Start ciproxy
        id: start-ciproxy
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
        uses: ./.github/actions/start-ciproxy
        with:
          master-token: ${{ secrets.MASTER_TOKEN }}
          ciproxy-dir: ${{ github.workspace }}/ciproxy
          port: ${{ env.CIPROXY_PORT }}

      - name: Install dependencies from vcpkg (windows-x64-static-md-obs)
        shell: env -i BASH_ENV=.bashenv_vcpkg bash --noprofile --norc -euo pipefail {0}
        run: '"$VCPKG_ROOT/vcpkg" install --triplet=x64-windows-static-md-obs'

      - name: Finalize ciproxy
        uses: ./.github/actions/finalize-ciproxy
        with:
          master-token: ${{ secrets.MASTER_TOKEN }}
          ciproxy-dir: ${{ github.workspace }}/ciproxy
          ciproxy-pid: ${{ steps.start-ciproxy.outputs.ciproxy-pid }}

  build-macos:
    strategy:
      fail-fast: false
      matrix:
        triplet: [arm64-osx-obs, x64-osx-obs]

    name: Build vcpkg for ${{ matrix.triplet }}

    runs-on: macos-15
    timeout-minutes: 180
    environment: production

    env:
      DEVELOPER_DIR: /Applications/Xcode_16.4.app

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go for ciproxy
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: ciproxy/go.mod

      - name: Extract vcpkg configuration
        id: vcpkg-configuration
        uses: ./.github/actions/extract-vcpkg-configuration
        with:
          path: vcpkg-configuration.json

      - name: Checkout vcpkg
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: microsoft/vcpkg
          ref: ${{ steps.vcpkg-configuration.outputs.DEFAULT_REGISTRY_BASELINE }}
          path: vcpkg
          filter: "blob:none"

      - name: Run bootstrap-vcpkg.sh
        shell: bash --noprofile --norc -euo pipefail {0}
        run: ./vcpkg/bootstrap-vcpkg.sh

      - name: Export clean env file for vcpkg (macOS)
        shell: bash --noprofile --norc -euo pipefail {0}
        run: |
          find /usr/local
          (
            printf 'declare -x DEVELOPER_DIR=%q\n' "$DEVELOPER_DIR"
            printf 'declare -x HOME=%q\n' "$HOME"
            printf 'declare -x PATH=%q\n' "/usr/bin:/bin:/usr/sbin:/sbin"
            printf 'declare -x TMPDIR=%q\n' "$TMPDIR"
            printf 'declare -x USER=%q\n' "$USER"

            printf 'declare -x VCPKG_BINARY_SOURCES=%q\n' "$VCPKG_BINARY_SOURCES"
            printf 'declare -x VCPKG_ROOT=%q\n' "$GITHUB_WORKSPACE/vcpkg"
          ) > .bashenv_vcpkg

      - name: Start ciproxy
        id: start-ciproxy
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
        uses: ./.github/actions/start-ciproxy
        with:
          master-token: ${{ secrets.MASTER_TOKEN }}
          ciproxy-dir: ${{ github.workspace }}/ciproxy
          port: ${{ env.CIPROXY_PORT }}

      - name: Install dependencies from vcpkg (${{ matrix.triplet }})
        shell: env -i BASH_ENV=.bashenv_vcpkg bash --noprofile --norc -euo pipefail {0}
        run: '"$VCPKG_ROOT/vcpkg" install --triplet="${{ matrix.triplet }}"'

      - name: Finalize ciproxy
        uses: ./.github/actions/finalize-ciproxy
        with:
          master-token: ${{ secrets.MASTER_TOKEN }}
          ciproxy-dir: ${{ github.workspace }}/ciproxy
          ciproxy-pid: ${{ steps.start-ciproxy.outputs.ciproxy-pid }}

  build-linux-x64:
    name: Build vcpkg for linux-x64-obs

    runs-on: ubuntu-24.04
    timeout-minutes: 180
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go for ciproxy
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: ciproxy/go.mod

      - name: Extract vcpkg configuration
        id: vcpkg-configuration
        uses: ./.github/actions/extract-vcpkg-configuration
        with:
          path: vcpkg-configuration.json

      - name: Checkout vcpkg
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: microsoft/vcpkg
          ref: ${{ steps.vcpkg-configuration.outputs.DEFAULT_REGISTRY_BASELINE }}
          path: vcpkg
          filter: "blob:none"

      - name: Run bootstrap-vcpkg.sh
        shell: bash --noprofile --norc -euo pipefail {0}
        run: ./vcpkg/bootstrap-vcpkg.sh

      - name: Export clean env file for vcpkg (Linux)
        shell: bash --noprofile --norc -euo pipefail {0}
        run: |
          (
            printf 'declare -x HOME=%q\n' "$HOME"
            printf 'declare -x PATH=%q\n' "/usr/bin:/bin:/usr/sbin:/sbin"
            printf 'declare -x VCPKG_BINARY_SOURCES=%q\n' "$VCPKG_BINARY_SOURCES"
            printf 'declare -x VCPKG_ROOT=%q\n' "$GITHUB_WORKSPACE/vcpkg"
          ) > .bashenv_vcpkg

      - name: Start ciproxy
        id: start-ciproxy
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
        uses: ./.github/actions/start-ciproxy
        with:
          master-token: ${{ secrets.MASTER_TOKEN }}
          ciproxy-dir: ${{ github.workspace }}/ciproxy
          port: ${{ env.CIPROXY_PORT }}

      - name: Install dependencies from vcpkg (linux-x64-obs)
        shell: env -i BASH_ENV=.bashenv_vcpkg bash --noprofile --norc -euo pipefail {0}
        run: '"$VCPKG_ROOT/vcpkg" install --triplet=x64-linux-obs'

      - name: Finalize ciproxy
        uses: ./.github/actions/finalize-ciproxy
        with:
          master-token: ${{ secrets.MASTER_TOKEN }}
          ciproxy-dir: ${{ github.workspace }}/ciproxy
          ciproxy-pid: ${{ steps.start-ciproxy.outputs.ciproxy-pid }}
