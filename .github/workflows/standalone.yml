name: Standalone CI

on:
  push:
    branches: [main]
  schedule:
    - cron: 23 9 * * *
  workflow_dispatch:

permissions:
  attestations: write
  contents: read
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CIPROXY_PORT: "8080"
  VCPKG_BINARY_SOURCES: clear;http,http://localhost:8080/{name}/{version}/{sha},readwrite

jobs:
  build-windows-x64:
    name: Build vcpkg for windows-x64-static-md-obs

    runs-on: windows-2022
    timeout-minutes: 180
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go for ciproxy
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: ciproxy/go.mod
          cache-dependency-path: ciproxy/go.mod

      - name: Extract vcpkg configuration
        id: vcpkg-configuration
        uses: ./.github/actions/extract-vcpkg-configuration
        with:
          path: vcpkg-configuration.json

      - name: Checkout vcpkg
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: microsoft/vcpkg
          ref: ${{ steps.vcpkg-configuration.outputs.DEFAULT_REGISTRY_BASELINE }}
          path: vcpkg
          filter: "blob:none"

      - name: Run bootstrap-vcpkg.bat
        shell: pwsh
        run: ./vcpkg/bootstrap-vcpkg.bat -disableMetrics

      - name: Start ciproxy
        id: start-ciproxy
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
        uses: ./.github/actions/start-ciproxy
        with:
          master-token: ${{ secrets.MASTER_TOKEN }}
          ciproxy-dir: ciproxy
          port: ${{ env.CIPROXY_PORT }}

      - name: Install dependencies from vcpkg (windows-x64-static-md-obs)
        shell: pwsh -NoProfile -Command ". .github/scripts/clean-env-windows.ps1 && . '{0}'"
        env:
          PATH: 'C:\Windows\system32;C:\Windows'
          VCPKG_ROOT: vcpkg
        run: '& "$Env:VCPKG_ROOT/vcpkg.exe" install --triplet=x64-windows-static-md-obs'

      - name: Finalize ciproxy
        uses: ./.github/actions/finalize-ciproxy
        with:
          master-token: ${{ secrets.MASTER_TOKEN }}
          ciproxy-dir: ciproxy
          ciproxy-pid: ${{ steps.start-ciproxy.outputs.ciproxy-pid }}

      - name: Upload ciproxy logs
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ciproxy-logs-${{ github.job }}
          path: |
            ${{ steps.start-ciproxy.outputs.ciproxy-stdout-log }}
            ${{ steps.start-ciproxy.outputs.ciproxy-stderr-log }}
          if-no-files-found: warn

  build-macos:
    strategy:
      fail-fast: false
      matrix:
        triplet: [arm64-osx-obs, x64-osx-obs]

    name: Build vcpkg for ${{ matrix.triplet }}

    runs-on: macos-15
    timeout-minutes: 180
    environment: production

    env:
      DEVELOPER_DIR: /Applications/Xcode_16.4.app

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go for ciproxy
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: ciproxy/go.mod
          cache-dependency-path: ciproxy/go.mod

      - name: Extract vcpkg configuration
        id: vcpkg-configuration
        uses: ./.github/actions/extract-vcpkg-configuration
        with:
          path: vcpkg-configuration.json

      - name: Checkout vcpkg
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: microsoft/vcpkg
          ref: ${{ steps.vcpkg-configuration.outputs.DEFAULT_REGISTRY_BASELINE }}
          path: vcpkg
          filter: "blob:none"

      - name: Run bootstrap-vcpkg.sh
        shell: bash --noprofile --norc -euo pipefail {0}
        run: ./vcpkg/bootstrap-vcpkg.sh -disableMetrics

      - name: Start ciproxy
        id: start-ciproxy
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
        uses: ./.github/actions/start-ciproxy
        with:
          master-token: ${{ secrets.MASTER_TOKEN }}
          ciproxy-dir: ciproxy
          port: ${{ env.CIPROXY_PORT }}

      - name: Install dependencies from vcpkg (${{ matrix.triplet }})
        shell: env BASH_ENV=.github/scripts/clean-env-macos.bash bash --noprofile --norc -euo pipefail {0}
        env:
          PATH: "/opt/homebrew/opt/curl/bin:/opt/homebrew/opt/wget/bin:/usr/bin:/bin:/usr/sbin:/sbin"
          VCPKG_ROOT: vcpkg
        run: '"$VCPKG_ROOT/vcpkg" install --triplet="${{ matrix.triplet }}"'

      - name: Finalize ciproxy
        uses: ./.github/actions/finalize-ciproxy
        with:
          master-token: ${{ secrets.MASTER_TOKEN }}
          ciproxy-dir: ciproxy
          ciproxy-pid: ${{ steps.start-ciproxy.outputs.ciproxy-pid }}

      - name: Upload ciproxy logs
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ciproxy-logs-${{ github.job }}
          path: |
            ${{ steps.start-ciproxy.outputs.ciproxy-stdout-log }}
            ${{ steps.start-ciproxy.outputs.ciproxy-stderr-log }}
          if-no-files-found: warn

  build-linux-x64:
    name: Build vcpkg for linux-x64-obs

    runs-on: ubuntu-24.04
    timeout-minutes: 180
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go for ciproxy
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: ciproxy/go.mod
          cache-dependency-path: ciproxy/go.mod

      - name: Extract vcpkg configuration
        id: vcpkg-configuration
        uses: ./.github/actions/extract-vcpkg-configuration
        with:
          path: vcpkg-configuration.json

      - name: Checkout vcpkg
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: microsoft/vcpkg
          ref: ${{ steps.vcpkg-configuration.outputs.DEFAULT_REGISTRY_BASELINE }}
          path: vcpkg
          filter: "blob:none"

      - name: Run bootstrap-vcpkg.sh
        shell: bash --noprofile --norc -euo pipefail {0}
        run: ./vcpkg/bootstrap-vcpkg.sh

      - name: Start ciproxy
        id: start-ciproxy
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
        uses: ./.github/actions/start-ciproxy
        with:
          master-token: ${{ secrets.MASTER_TOKEN }}
          ciproxy-dir: ciproxy
          port: ${{ env.CIPROXY_PORT }}

      - name: Install dependencies from vcpkg (linux-x64-obs)
        shell: env BASH_ENV=.github/scripts/clean-env-ubuntu.sh bash --noprofile --norc -euo pipefail {0}
        env:
          PATH: "/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin"
          VCPKG_ROOT: vcpkg
        run: '"$VCPKG_ROOT/vcpkg" install --triplet=x64-linux-obs'

      - name: Finalize ciproxy
        uses: ./.github/actions/finalize-ciproxy
        with:
          master-token: ${{ secrets.MASTER_TOKEN }}
          ciproxy-dir: ciproxy
          ciproxy-pid: ${{ steps.start-ciproxy.outputs.ciproxy-pid }}

      - name: Upload ciproxy logs
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ciproxy-logs-${{ github.job }}
          path: |
            ${{ steps.start-ciproxy.outputs.ciproxy-stdout-log }}
            ${{ steps.start-ciproxy.outputs.ciproxy-stderr-log }}
          if-no-files-found: warn
