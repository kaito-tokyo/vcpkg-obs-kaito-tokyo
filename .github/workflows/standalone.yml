name: Standalone

on:
  push:
    branches: [main]
  schedule:
    - cron: 23 9 * * *
  workflow_dispatch:

permissions:
  attestations: write
  contents: read
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CIPROXY_PORT: "8080"
  DEVELOPER_DIR: /Applications/Xcode_16.4.app
  HOMEBREW_NO_ANALYTICS: "1"
  HOMEBREW_NO_AUTO_UPDATE: "1"
  HOMEBREW_NO_ENV_HINTS: "1"
  HOMEBREW_NO_INSTALL_CLEANUP: "1"
  VCPKG_BINARY_SOURCES: clear;http,http://localhost:8080/{name}/{version}/{sha},readwrite

jobs:
  build-windows-x64:
    name: Build vcpkg for windows-x64-static-md-obs

    runs-on: windows-2022
    timeout-minutes: 180
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Export clean env file for vcpkg (Windows)
        shell: bash -euo pipefail {0}
        run: |
          (
            # System
            printf 'export SYSTEMROOT="%s"\n' "$SYSTEMROOT"
            printf 'export SYSTEMDRIVE="%s"\n' "$SYSTEMDRIVE"
            printf 'export WINDIR="%s"\n' "$WINDIR"
            printf 'export "ProgramFiles=%s"\n' "$PROGRAMFILES"
            printf 'export "ProgramFiles(x86)=%s"\n' "$PROGRAMFILES_X86_}"
            printf 'export ProgramW6432="%s"\n' "$ProgramW6432"
            printf 'export PROCESSOR_ARCHITECTURE="%s"\n' "$PROCESSOR_ARCHITECTURE"
            printf 'export TEMP="%s"\n' "$TEMP"
            printf 'export TMP="%s"\n' "$TMP"
            printf 'export USERPROFILE="%s"\n' "$USERPROFILE"
            printf 'export LOCALAPPDATA="%s"\n' "$LOCALAPPDATA"

            # Build env
            printf 'export VCPKG_ROOT="%s"\n' "$VCPKG_INSTALLATION_ROOT"
            printf 'export VCPKG_BINARY_SOURCES="%s"\n' "$VCPKG_BINARY_SOURCES"
            printf 'export PATH="%s"\n' "/usr/bin:/c/Windows/system32:/c/Windows"
          ) > .bashrc_vcpkg

      - name: Start ciproxy
        id: start-ciproxy
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
        uses: ./.github/actions/start-ciproxy
        with:
          master-token: ${{ secrets.MASTER_TOKEN }}
          ciproxy-dir: ${{ github.workspace }}/ciproxy
          port: ${{ env.CIPROXY_PORT }}

      - name: Install dependencies from vcpkg (windows-x64-static-md-obs)
        shell: env -i BASH_ENV=.bashrc_vcpkg bash -euo pipefail {0}
        run: '"$VCPKG_ROOT/vcpkg" install --triplet=x64-windows-static-md-obs'

      - name: Finalize ciproxy
        uses: ./.github/actions/finalize-ciproxy
        with:
          master-token: ${{ secrets.MASTER_TOKEN }}
          ciproxy-dir: ${{ github.workspace }}/ciproxy
          ciproxy-pid: ${{ steps.start-ciproxy.outputs.ciproxy-pid }}

  build-macos:
    strategy:
      fail-fast: false
      matrix:
        triplet: [arm64-osx-obs, x64-osx-obs]

    name: Build vcpkg for ${{ matrix.triplet }}

    runs-on: macos-15
    timeout-minutes: 180
    environment: production

    env:
      DEVELOPER_DIR: /Applications/Xcode_16.4.app

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Export clean env file for vcpkg (macOS)
        shell: bash -euo pipefail {0}
        run: |
          (
            printf 'export DEVELOPER_DIR="%s"\n' "$DEVELOPER_DIR"
            printf 'export HOME="%s"\n' "$HOME"
            printf 'export PATH="%s"\n' "/usr/bin:/bin:/usr/sbin:/sbin"
            printf 'export VCPKG_BINARY_SOURCES="%s"\n' "$VCPKG_BINARY_SOURCES"
            printf 'export VCPKG_ROOT="%s"\n' "$VCPKG_INSTALLATION_ROOT"
          ) > .bashrc_vcpkg

      - name: Start ciproxy
        id: start-ciproxy
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
        uses: ./.github/actions/start-ciproxy
        with:
          master-token: ${{ secrets.MASTER_TOKEN }}
          ciproxy-dir: ${{ github.workspace }}/ciproxy
          port: ${{ env.CIPROXY_PORT }}

      - name: Install dependencies from vcpkg (${{ matrix.triplet }})
        shell: env -i BASH_ENV=.bashrc_vcpkg bash -euo pipefail {0}
        run: '"$VCPKG_ROOT/vcpkg" install --triplet="${{ matrix.triplet }}"'

      - name: Finalize ciproxy
        uses: ./.github/actions/finalize-ciproxy
        with:
          master-token: ${{ secrets.MASTER_TOKEN }}
          ciproxy-dir: ${{ github.workspace }}/ciproxy
          ciproxy-pid: ${{ steps.start-ciproxy.outputs.ciproxy-pid }}

  build-linux-x64:
    name: Build vcpkg for linux-x64-obs

    runs-on: ubuntu-24.04
    timeout-minutes: 180
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Export clean env file for vcpkg (Linux)
        shell: bash -euo pipefail {0}
        run: |
          (
            printf 'export HOME="%s"\n' "$HOME"
            printf 'export PATH="%s"\n' "/usr/bin:/bin:/usr/sbin:/sbin"
            printf 'export VCPKG_BINARY_SOURCES="%s"\n' "$VCPKG_BINARY_SOURCES"
            printf 'export VCPKG_ROOT="%s"\n' "$VCPKG_INSTALLATION_ROOT"
          ) > .bashrc_vcpkg

      - name: Start ciproxy
        id: start-ciproxy
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
        uses: ./.github/actions/start-ciproxy
        with:
          master-token: ${{ secrets.MASTER_TOKEN }}
          ciproxy-dir: ${{ github.workspace }}/ciproxy
          port: ${{ env.CIPROXY_PORT }}

      - name: Install dependencies from vcpkg (linux-x64-obs)
        shell: env -i BASH_ENV=.bashrc_vcpkg bash -euo pipefail {0}
        run: '"$VCPKG_ROOT/vcpkg" install --triplet=x64-linux-obs'

      - name: Finalize ciproxy
        uses: ./.github/actions/finalize-ciproxy
        with:
          master-token: ${{ secrets.MASTER_TOKEN }}
          ciproxy-dir: ${{ github.workspace }}/ciproxy
          ciproxy-pid: ${{ steps.start-ciproxy.outputs.ciproxy-pid }}
