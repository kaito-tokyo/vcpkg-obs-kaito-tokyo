# author: Kaito Udagawa <umireon@kaito.tokyo>
# date: 2026-05-27

on:
  workflow_call:
    inputs:
      job-index:
        description: The job index for logging.
        required: true
        type: number
      environment:
        description: The environment name for this workflow, or empty string for no environment.
        required: true
        type: string
      runs-on:
        description: The runner label to run this workflow on.
        required: true
        type: string
      DEVELOPER_DIR:
        description: The value of DEVELOPER_DIR environment variable.
        required: true
        type: string
      VCPKG_VERSION:
        description: The version of vcpkg to clone.
        required: true
        type: string
      VCPKG_BINARY_SOURCES:
        description: Default VCPKG_BINARY_SOURCES.
        required: true
        type: string
      VCPKG_TARGET_TRIPLET:
        description: Target triplet for vcpkg.
        required: true
        type: string
      VCPKG_PORTS:
        description: Space-delimited vcpkg port names to install.
        required: true
        type: string

    secrets:
      CIPROXY_MASTER_TOKEN:
        description: CIProxy master token.
        required: false

permissions: {}

jobs:
  build-classic-macos:
    runs-on: ${{ inputs.runs-on }}
    timeout-minutes: 180
    environment: ${{ inputs.environment }}

    permissions:
      attestations: write
      contents: read
      id-token: write

    env:
      DEVELOPER_DIR: '${{ inputs.DEVELOPER_DIR }}'
      MINIMAL_PATH: '/usr/bin:/bin:/usr/sbin:/sbin'
      VCPKG_PORTS: '${{ inputs.VCPKG_PORTS }}'
      VCPKG_TARGET_TRIPLET: '${{ inputs.VCPKG_TARGET_TRIPLET }}'
      VCPKG_VERSION: '${{ inputs.VCPKG_VERSION }}'

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Checkout vcpkg
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: microsoft/vcpkg
          ref: ${{ env.VCPKG_VERSION }}
          persist-credentials: false
          path: vcpkg
          filter: blob:none

      - name: Set up Go for ciproxy
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: .github/actions/ciproxy/cmd/go.mod
          cache-dependency-path: .github/actions/ciproxy/cmd/go.sum

      - name: Print Xcode version
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        run: |
          xcodebuild -version

      - name: Set up vcpkg using Bash
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        run: |
          ./vcpkg/bootstrap-vcpkg.sh -disableMetrics

      - name: Print vcpkg toolchains
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        env:
          VCPKG_ROOT: '${{ github.workspace }}/vcpkg'
        run: |
          export PATH="$MINIMAL_PATH"
          ./vcpkg/vcpkg fetch cmake
          ./vcpkg/vcpkg fetch ninja

      - name: Start ciproxy
        id: ciproxy
        if: github.ref == 'refs/heads/main'
        uses: ./.github/actions/ciproxy/start
        with:
          ciproxy-master-token: ${{ secrets.CIPROXY_MASTER_TOKEN }}

      - name: Install VCPKG_PORTS on macOS arm64 (Classic mode)
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        env:
          VCPKG_BINARY_SOURCES: '${{ steps.ciproxy.outputs.VCPKG_BINARY_SOURCES || inputs.VCPKG_BINARY_SOURCES }}'
        run: |
          vars=(
            DEVELOPER_DIR="$DEVELOPER_DIR"
            HOME="$HOME"
            PATH="$MINIMAL_PATH"
            VCPKG_BINARY_SOURCES="$VCPKG_BINARY_SOURCES"
            VCPKG_ROOT="$GITHUB_WORKSPACE/vcpkg"
          )
          IFS=' ' read -r -a ports <<< "$VCPKG_PORTS"
          env -i "${vars[@]}" ./vcpkg/vcpkg install --classic --overlay-triplets=vcpkg-triplets --triplet="$VCPKG_TARGET_TRIPLET" "${ports[@]}"

      - name: Stop ciproxy and upload binary packages
        if: github.ref == 'refs/heads/main'
        uses: ./.github/actions/ciproxy/finalize
        with:
          ciproxy-master-token: ${{ secrets.CIPROXY_MASTER_TOKEN }}
          pid: ${{ steps.ciproxy.outputs.PID }}

      - name: Upload ciproxy logs
        if: github.ref == 'refs/heads/main' && always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ciproxy-logs-${{ github.job }}-${{ inputs.job-index }}
          path: |
            ${{ steps.ciproxy.outputs.STDOUT_LOG }}
            ${{ steps.ciproxy.outputs.STDERR_LOG }}
          if-no-files-found: warn
