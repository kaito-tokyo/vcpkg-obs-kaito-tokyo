# author: Kaito Udagawa <umireon@kaito.tokyo>
# date: 2026-06-18

on:
  workflow_call:
    inputs:
      job-index:
        description: The job index for logging.
        required: true
        type: number
      environment:
        description: The environment name for this workflow, or empty string for no environment
        required: true
        type: string
      runs-on:
        description: The runner label to run this workflow on.
        required: true
        type: string
      DEVELOPER_DIR:
        description: The value of DEVELOPER_DIR environment variable.
        required: true
        type: string
      OSX_ARCHITECTURES:
        description: The architecture to build for.
        required: true
        type: string
      OSX_DEPLOYMENT_TARGET:
        description: The deployment target of macOS.
        required: true
        type: string
      VCPKG_VERSION:
        description: The version of vcpkg to clone.
        required: true
        type: string
      VCPKG_BINARY_SOURCES:
        description: Default VCPKG_BINARY_SOURCES.
        required: true
        type: string
      ORT_VERSION:
        description: The version of ONNX Runtime to build.
        required: true
        type: string

    secrets:
      CIPROXY_MASTER_TOKEN:
        description: The master token for ciproxy.
        required: false

permissions: {}

jobs:
  build-ort-vcpkg-macos:
    runs-on: ${{ inputs.runs-on }}
    timeout-minutes: 180
    environment: ${{ inputs.environment }}

    permissions:
      attestations: write
      contents: read
      id-token: write

    env:
      DEVELOPER_DIR: '${{ inputs.DEVELOPER_DIR }}'
      OSX_ARCHITECTURES: '${{ inputs.OSX_ARCHITECTURES }}'
      OSX_DEPLOYMENT_TARGET: '${{ inputs.OSX_DEPLOYMENT_TARGET }}'
      PLUGIN_VCPKG_VERSION: '${{ inputs.VCPKG_VERSION }}'
      PLUGIN_ORT_VERSION: '${{ inputs.ORT_VERSION }}'

    steps:
      - name: Print Xcode version
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        run: |
          xcodebuild -version

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Checkout vcpkg
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: microsoft/vcpkg
          ref: ${{ env.PLUGIN_VCPKG_VERSION }}
          persist-credentials: false
          path: vcpkg
          filter: blob:none

      - name: Run bootstrap-vcpkg.sh
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        run: |
          ./vcpkg/bootstrap-vcpkg.sh -disableMetrics

      - name: Set up Python for build requirements
        id: setup-python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version-file: .python-version
          pip-install: -r requirements-build.txt

      - name: Set up Go for ciproxy
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: .github/actions/ciproxy/cmd/go.mod
          cache-dependency-path: .github/actions/ciproxy/cmd/go.sum

      - name: Checkout ONNX Runtime
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: microsoft/onnxruntime
          ref: ${{ env.PLUGIN_ORT_VERSION }}
          persist-credentials: false
          path: onnxruntime
          submodules: recursive

      - name: Start ciproxy
        id: ciproxy
        if: github.ref == 'refs/heads/main'
        uses: ./.github/actions/ciproxy/start
        with:
          ciproxy-master-token: ${{ secrets.CIPROXY_MASTER_TOKEN }}

      - name: Install dependencies from ONNX Runtime's vcpkg (macOS)
        shell: pwsh
        env:
          PYTHON: ${{ steps.setup-python.outputs.python-path }}
          VCPKG_BINARY_SOURCES: '${{ steps.ciproxy.outputs.VCPKG_BINARY_SOURCES || inputs.VCPKG_BINARY_SOURCES }}'
        run: |
          Set-StrictMode -Version Latest; $ErrorActionPreference = 'Stop'; $PSNativeCommandUseErrorActionPreference = $true; $ProgressPreference = 'SilentlyContinue'

          Import-Module ./scripts/BuildOnnxRuntime.psm1

          $env:VCPKG_ROOT = Join-Path $env:GITHUB_WORKSPACE 'vcpkg'

          $env:PATH = @(
              Split-Path (Get-OrtToolchain -Name cmake) -Parent
              Split-Path (Get-OrtToolchain -Name ninja) -Parent
              '/usr/bin',
              '/bin',
              '/usr/sbin',
              '/sbin'
          ) -join ':'

          Update-OrtSourceWithPatches
          Invoke-OrtBuildPy -Command update -Arch $env:OSX_ARCHITECTURES -OsxDeploymentTarget $env:OSX_DEPLOYMENT_TARGET

      - name: Stop ciproxy and upload binary packages
        if: github.ref == 'refs/heads/main'
        uses: ./.github/actions/ciproxy/finalize
        with:
          ciproxy-master-token: ${{ secrets.CIPROXY_MASTER_TOKEN }}
          pid: ${{ steps.ciproxy.outputs.PID }}

      - name: Upload ciproxy logs
        if: github.ref == 'refs/heads/main' && always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ciproxy-logs-${{ github.job }}-${{ inputs.job-index }}
          path: |
            ${{ steps.ciproxy.outputs.STDOUT_LOG }}
            ${{ steps.ciproxy.outputs.STDERR_LOG }}
          if-no-files-found: warn
