# date: 2026-06-18

on:
  workflow_call:
    inputs:
      job-index:
        description: The job index for logging.
        required: true
        type: number
      environment:
        description: The environment name for this workflow, or empty string for no environment
        required: true
        type: string
      WINDOWS_SDK_VERSION:
        description: The version of Windows SDK to build with.
        required: true
        type: string
      VCPKG_VERSION:
        description: Default VCPKG_BINARY_SOURCES.
        required: true
        type: string
      VCPKG_BINARY_SOURCES:
        description: Default VCPKG_BINARY_SOURCES.
        required: true
        type: string
      ORT_VERSION:
        description: The version of ONNX Runtime to build.
        required: true
        type: string

    secrets:
      CIPROXY_MASTER_TOKEN:
        description: The master token for ciproxy.
        required: false

permissions: {}

jobs:
  build-ort-vcpkg-windows-x64:
    runs-on: windows-2022
    timeout-minutes: 180
    environment: ${{ inputs.environment }}

    permissions:
      attestations: write
      contents: read
      id-token: write

    env:
      PLUGIN_ORT_VERSION: '${{ inputs.ORT_VERSION }}'
      PLUGIN_VCPKG_VERSION: '${{ inputs.VCPKG_VERSION }}'
      PLUGIN_WINDOWS_SDK_VERSION: '${{ inputs.WINDOWS_SDK_VERSION }}'

    steps:
      - name: Enable Windows long path
        shell: pwsh
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\FileSystem' -Name 'LongPathsEnabled' -Value 1

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Checkout vcpkg
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: microsoft/vcpkg
          ref: ${{ env.PLUGIN_VCPKG_VERSION }}
          persist-credentials: false
          path: vcpkg
          filter: blob:none

      - name: Run bootstrap-vcpkg.bat
        shell: pwsh
        run: |
          ./vcpkg/bootstrap-vcpkg.bat -disableMetrics

      - name: Set up Python for build requirements
        id: setup-python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version-file: .python-version
          pip-install: -r requirements-build.txt

      - name: Set up Go for ciproxy
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: .github/actions/ciproxy/cmd/go.mod
          cache-dependency-path: .github/actions/ciproxy/cmd/go.sum

      - name: Checkout ONNX Runtime
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: microsoft/onnxruntime
          ref: ${{ env.PLUGIN_ORT_VERSION }}
          persist-credentials: false
          path: onnxruntime
          submodules: recursive

      - name: Start ciproxy
        id: ciproxy
        if: github.ref == 'refs/heads/main'
        uses: ./.github/actions/ciproxy/start
        with:
          ciproxy-master-token: ${{ secrets.CIPROXY_MASTER_TOKEN }}

      - name: Install dependencies from ONNX Runtime's vcpkg (Windows)
        shell: pwsh
        env:
          PYTHON: ${{ steps.setup-python.outputs.python-path }}
          VCPKG_BINARY_SOURCES: '${{ steps.ciproxy.outputs.VCPKG_BINARY_SOURCES || inputs.VCPKG_BINARY_SOURCES }}'
        run: |
          Set-StrictMode -Version Latest; $ErrorActionPreference = 'Stop'; $PSNativeCommandUseErrorActionPreference = $true; $ProgressPreference = 'SilentlyContinue'

          Import-Module ./scripts/BuildOnnxRuntime.psm1

          $env:PATH = @(
              Split-Path (Get-OrtToolchain -Name cmake) -Parent
              Split-Path (Get-OrtToolchain -Name ninja) -Parent
              Split-Path (Get-OrtToolchain -Name vswhere) -Parent
              'C:\Program Files\Git\cmd',
              'C:\Windows\System32\WindowsPowerShell\v1.0',
              'C:\Windows\System32',
              'C:\Windows'
          ) -join ';'

          Remove-Item env:VCPKG_INSTALLATION_ROOT

          Update-OrtSourceWithPatches
          Invoke-OrtBuildPy -Command update

      - name: Stop ciproxy and upload binary packages
        if: github.ref == 'refs/heads/main'
        uses: ./.github/actions/ciproxy/finalize
        with:
          ciproxy-master-token: ${{ secrets.CIPROXY_MASTER_TOKEN }}
          pid: ${{ steps.ciproxy.outputs.PID }}

      - name: Upload ciproxy logs
        if: github.ref == 'refs/heads/main' && always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ciproxy-logs-${{ github.job }}-${{ inputs.job-index }}
          path: |
            ${{ steps.ciproxy.outputs.STDOUT_LOG }}
            ${{ steps.ciproxy.outputs.STDERR_LOG }}
          if-no-files-found: warn
