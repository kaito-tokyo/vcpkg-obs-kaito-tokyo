# date: 2026-05-25

on:
  workflow_call:
    inputs:
      job-index:
        description: The job index for logging.
        required: true
        type: number
      environment:
        description: The environment name for this workflow, or empty string for no environment
        required: true
        type: string
      VCPKG_VERSION:
        description: Default VCPKG_BINARY_SOURCES.
        required: true
        type: string
      VCPKG_BINARY_SOURCES:
        description: Default VCPKG_BINARY_SOURCES.
        required: true
        type: string
      ORT_VERSION:
        description: The version of ONNX Runtime to build.
        required: true
        type: string

    secrets:
      CIPROXY_MASTER_TOKEN:
        description: The master token for ciproxy.
        required: false

permissions: {}

jobs:
  build-ort-vcpkg-windows-x64:
    runs-on: windows-2022
    timeout-minutes: 180
    environment: ${{ inputs.environment }}

    permissions:
      attestations: write
      contents: read
      id-token: write

    env:
      MINIMAL_PATH: 'C:\Program Files\Git\cmd;C:\Windows\System32\WindowsPowerShell\v1.0;C:\Windows\System32;C:\Windows'
      ORT_VERSION: '${{ inputs.ORT_VERSION }}'
      VCPKG_VERSION: '${{ inputs.VCPKG_VERSION }}'

    steps:
      - name: Enable Windows long path
        shell: pwsh
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\FileSystem' -Name 'LongPathsEnabled' -Value 1

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Checkout vcpkg
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: microsoft/vcpkg
          ref: ${{ env.VCPKG_VERSION }}
          persist-credentials: false
          path: vcpkg
          filter: blob:none

      - name: Checkout ONNX Runtime
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: microsoft/onnxruntime
          ref: ${{ env.ORT_VERSION }}
          persist-credentials: false
          path: onnxruntime
          submodules: recursive

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version-file: .python-version
          pip-install: -r requirements-build.txt

      - name: Set up Go for ciproxy
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: .github/actions/ciproxy/cmd/go.mod
          cache-dependency-path: .github/actions/ciproxy/cmd/go.sum

      - name: Set up vcpkg using PowerShell
        shell: pwsh
        run: |
          ./vcpkg/bootstrap-vcpkg.bat -disableMetrics

      - name: Set up vcpkg toolchains using PowerShell
        shell: pwsh
        env:
          VCPKG_ROOT: '${{ github.workspace }}/vcpkg'
        run: |
          $env:Path = $env:MINIMAL_PATH

          $CMAKE_EXE = ./vcpkg/vcpkg.exe fetch cmake | Select-Object -Last 1
          $NINJA_EXE = ./vcpkg/vcpkg.exe fetch ninja | Select-Object -Last 1
          $VSWHERE_EXE = ./vcpkg/vcpkg.exe fetch vswhere | Select-Object -Last 1

          Add-Content -Path $env:GITHUB_ENV -Value "CMAKE_DIR=$(Split-Path -Parent $CMAKE_EXE)" -Encoding utf8
          Add-Content -Path $env:GITHUB_ENV -Value "NINJA_DIR=$(Split-Path -Parent $NINJA_EXE)" -Encoding utf8
          Add-Content -Path $env:GITHUB_ENV -Value "VSWHERE_DIR=$(Split-Path -Parent $VSWHERE_EXE)" -Encoding utf8

          & $CMAKE_EXE --version
          & $NINJA_EXE --version
          & $VSWHERE_EXE --version

      - name: Patch ONNX Runtime
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        run: |
          patches=(scripts/ort_patches/*.patch)
          for patch in "${patches[@]}"; do
            git -C onnxruntime apply "../$patch"
          done

      - name: Start ciproxy
        id: ciproxy
        if: github.ref == 'refs/heads/main'
        uses: ./.github/actions/ciproxy/start
        with:
          ciproxy-master-token: ${{ secrets.CIPROXY_MASTER_TOKEN }}

      - name: Build vcpkg of ONNX Runtime on Windows
        shell: pwsh
        env:
          PYTHON_EXE: ${{ steps.setup-python.outputs.python-path }}
          VCPKG_BINARY_SOURCES: '${{ steps.ciproxy.outputs.VCPKG_BINARY_SOURCES || inputs.VCPKG_BINARY_SOURCES }}'
        run: |
          $env:Path = "$(Split-Path -Parent $env:PYTHON_EXE);$env:CMAKE_DIR;$env:NINJA_DIR;$env:VSWHERE_DIR;$env:MINIMAL_PATH"
          $env:VCPKG_INSTALLATION_ROOT = "$env:GITHUB_WORKSPACE\vcpkg"
          ./scripts/build_ort_windows.ps1 run_build_py x64 update

      - name: Stop ciproxy and upload binary packages
        if: github.ref == 'refs/heads/main'
        uses: ./.github/actions/ciproxy/finalize
        with:
          ciproxy-master-token: ${{ secrets.CIPROXY_MASTER_TOKEN }}
          pid: ${{ steps.ciproxy.outputs.PID }}

      - name: Upload ciproxy logs
        if: github.ref == 'refs/heads/main' && always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ciproxy-logs-${{ github.job }}-${{ inputs.job-index }}
          path: |
            ${{ steps.ciproxy.outputs.STDOUT_LOG }}
            ${{ steps.ciproxy.outputs.STDERR_LOG }}
          if-no-files-found: warn
