on:
  workflow_call:
    inputs:
      environment-prepare-devcontainer:
        description: The environment name for the prepare-devcontainer jobs, or empty string for no environment.
        required: true
        type: string
      environment-build-devcontainer:
        description: The environment name for the build-devcontainer jobs, or empty string for no environment.
        required: true
        type: string
      VCPKG_BINARY_SOURCES:
        description: Default VCPKG_BINARY_SOURCES.
        required: true
        type: string

    secrets:
      CIPROXY_MASTER_TOKEN:
        description: CIProxy master token.
        required: false

jobs:
  prepare-devcontainer:
    name: Prepare Dev Container

    runs-on: ubuntu-24.04
    timeout-minutes: 180
    environment: ${{ inputs.environment-prepare-devcontainer }}

    permissions:
      artifact-metadata: write
      attestations: write
      contents: read
      id-token: write
      packages: write

    outputs:
      DEVCONTAINER_IMAGE: "${{ steps.build-and-push.outputs.DEVCONTAINER_IMAGE }}"

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Log in to the GitHub Container registry
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: printenv GITHUB_TOKEN | docker login ghcr.io --username "$GITHUB_ACTOR" --password-stdin

      - name: Set up Buildx builder
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        run: docker buildx create --bootstrap --use

      - name: Build and Push builder image
        id: build-and-push
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        run: |
          IMAGE_NAME="ghcr.io/${GITHUB_REPOSITORY,,}-devcontainer"

          BUILD_ARGS=(
            --cache-from=type=gha
            --cache-to=type=gha,mode=max
            --platform=linux/amd64
            --provenance=mode=max
            --push
            --sbom=true
          )

          SHA_TAG="$IMAGE_NAME:sha-${GITHUB_SHA:0:7}"
          echo "DEVCONTAINER_IMAGE=$SHA_TAG" >> "$GITHUB_OUTPUT"
          BUILD_ARGS+=(--tag="$SHA_TAG")

          if [[ "$GITHUB_REF" = "refs/heads/main" ]]; then
            BUILD_ARGS+=(--tag="$IMAGE_NAME:latest")
            BUILD_ARGS+=(--tag="$IMAGE_NAME:main")
          elif [[ "$GITHUB_REF" =~ ^refs/heads/(.*)$ ]]; then
            BUILD_ARGS+=(--tag="$IMAGE_NAME:${BASH_REMATCH[1],,}")
          elif [[ "$GITHUB_REF" =~ ^refs/pull/(.*)/merge$ ]]; then
            BUILD_ARGS+=(--tag="$IMAGE_NAME:pr-${BASH_REMATCH[1],,}")
          elif [[ "$GITHUB_REF" =~ ^refs/tags/(.*)$ ]]; then
            BUILD_ARGS+=(--tag="$IMAGE_NAME:${BASH_REMATCH[1],,}")
          fi

          docker buildx build "${BUILD_ARGS[@]}" .devcontainer

  build-devcontainer:
    name: Build vcpkg for Dev Container

    needs: prepare-devcontainer

    runs-on: ubuntu-24.04
    timeout-minutes: 180
    environment: ${{ inputs.environment-build-devcontainer }}

    permissions:
      artifact-metadata: write
      attestations: write
      contents: read
      id-token: write
      packages: read

    container:
      image: ${{ needs.prepare-devcontainer.outputs.DEVCONTAINER_IMAGE }}
      options: --user runner

    env:
      VCPKG_BINARY_SOURCES: ${{ github.ref == 'refs/heads/main' && 'clear;http,http://127.0.0.1:8080/{name}/{version}/{sha},readwrite' || inputs.VCPKG_BINARY_SOURCES }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Go for ciproxy
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: .github/actions/ciproxy/cmd/go.mod
          cache-dependency-path: .github/actions/ciproxy/cmd/go.sum

      - name: Start ciproxy
        id: ciproxy
        if: github.ref == 'refs/heads/main'
        uses: ./.github/actions/ciproxy/start
        with:
          ciproxy-master-token: ${{ secrets.CIPROXY_MASTER_TOKEN }}
          port: "8080"

      - name: Install dependencies from vcpkg (x64-linux-obs)
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        run: '"$VCPKG_ROOT/vcpkg" install --triplet=x64-linux-obs'

      - name: Finalize ciproxy
        if: github.ref == 'refs/heads/main'
        uses: ./.github/actions/ciproxy/finalize
        with:
          ciproxy-master-token: ${{ secrets.CIPROXY_MASTER_TOKEN }}
          pid: ${{ steps.ciproxy.outputs.PID }}

      - name: Upload ciproxy logs
        if: github.ref == 'refs/heads/main' && always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ciproxy-logs-${{ github.job }}-${{ strategy.job-index }}
          path: |
            ${{ steps.ciproxy.outputs.STDOUT_LOG }}
            ${{ steps.ciproxy.outputs.STDERR_LOG }}
          if-no-files-found: warn
