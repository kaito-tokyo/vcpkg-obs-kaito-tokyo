name: ORT

on:
  push:
    branches: [main]
  schedule:
    - cron: 17 2 * * *
  workflow_dispatch:

permissions:
  attestations: write
  contents: read
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CIPROXY_PORT: 8080
  HOMEBREW_NO_ANALYTICS: "1"
  HOMEBREW_NO_AUTO_UPDATE: "1"
  HOMEBREW_NO_ENV_HINTS: "1"
  HOMEBREW_NO_INSTALL_CLEANUP: "1"
  VCPKG_BINARY_SOURCES: clear;http,http://localhost:8080/{name}/{version}/{sha},readwrite

jobs:
  build-ort-vcpkg-windows:
    strategy:
      fail-fast: false
      matrix:
        ort-version: [v1.24.1]

    name: Build vcpkg in ORT for Windows x64

    runs-on: windows-2022
    timeout-minutes: 180
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Start ciproxy
        id: start-ciproxy
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
        uses: ./.github/actions/start-ciproxy
        with:
          master-token: ${{ secrets.MASTER_TOKEN }}
          ciproxy-dir: ciproxy
          port: ${{ env.CIPROXY_PORT }}

      - name: Checkout ONNX Runtime
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: microsoft/onnxruntime
          ref: ${{ matrix.ort-version }}
          path: .deps_vendor/onnxruntime
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version-file: ".python-version"
          pip-install: -r requirements-build.txt

      - name: Build vcpkg of ONNX Runtime
        shell: pwsh -NoProfile -Command ". .github/scripts/clean-env-windows.ps1 && . '{0}'"
        env:
          PATH: 'C:\Program Files\CMake\bin;C:\Program Files\Ninja;C:\Program Files\Git\cmd;C:\Windows\system32;C:\Windows'
        run: |
          python3 ./.deps_vendor/onnxruntime/tools/ci_build/build.py `
            --build_dir ./.deps_vendor/ort_x64 `
            --update `
            --config Release `
            --parallel `
            --compile_no_warning_as_error `
            --cmake_extra_defines `
            CMAKE_POLICY_VERSION_MINIMUM=3.5 `
            --use_vcpkg `
            --skip_submodule_sync `
            --skip_tests `
            --disable_rtti

      - name: Finalize ciproxy
        uses: ./.github/actions/finalize-ciproxy
        with:
          master-token: ${{ secrets.MASTER_TOKEN }}
          ciproxy-dir: ciproxy
          ciproxy-pid: ${{ steps.start-ciproxy.outputs.ciproxy-pid }}
