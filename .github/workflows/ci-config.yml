name: CI config

# file: .github/workflows/ci-config.yml
# author: Kaito Udagawa <umireon@kaito.tokyo>
# date: 2026-06-22

on:
  workflow_call:
    outputs:
      VCPKG_VERSION:
        value: ${{ fromJson(jobs.ci-config.outputs.BUILDSPEC_PROPS).vcpkg_default_git_tag }}
      ORT_VERSION:
        value: ${{ fromJson(jobs.ci-config.outputs.BUILDSPEC_PROPS).onnxruntime_git_tag }}
      WINDOWS_SDK_VERSION:
        value: ${{ fromJson(jobs.ci-config.outputs.CMAKE_PRESETS_WINDOWS).cacheVariables.CMAKE_SYSTEM_VERSION }}
      OSX_DEPLOYMENT_TARGET:
        value: ${{ fromJson(jobs.ci-config.outputs.CMAKE_PRESETS_MACOS).cacheVariables.CMAKE_OSX_DEPLOYMENT_TARGET }}
      VCPKG_BINARY_SOURCES:
        value: clear;http,https://vcpkg-obs.kaito.tokyo/{name}/{version}/{sha},read

permissions: {}

jobs:
  ci-config:
    outputs:
      BUILDSPEC_PROPS: ${{ toJson(steps.buildspec-props.outputs) }}
      CMAKE_PRESETS_WINDOWS: ${{ steps.cmakepresets-json.outputs.windows }}
      CMAKE_PRESETS_MACOS: ${{ steps.cmakepresets-json.outputs.macos }}
      CMAKE_PRESETS_LINUX: ${{ steps.cmakepresets-json.outputs.linux }}

    runs-on: ubuntu-slim
    timeout-minutes: 30

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Extract buildspec.props
        id: buildspec-props
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        run: |
          awk '!/(^#|^[[:space:]]*$)/' buildspec.props | tee -a "$GITHUB_OUTPUT"

      - name: Extract CMakePresets.json
        id: cmakepresets-json
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        run: |
          for name in windows macos linux; do
            printf '%s<<EOS\n' "$name" >> "$GITHUB_OUTPUT"
            <CMakePresets.json jq --arg presetName "$name" '.configurePresets[] | select(.name == $presetName)' | tee -a "$GITHUB_OUTPUT"
            printf '\nEOS\n' >> "$GITHUB_OUTPUT"
          done
