# date: 2026-04-03

on:
  workflow_call:
    inputs:
      job-index:
        description: The job index for logging.
        required: true
        type: number
      environment:
        description: The environment name for this workflow, or empty string for no environment
        required: true
        type: string
      VCPKG_BINARY_SOURCES:
        description: Default VCPKG_BINARY_SOURCES.
        required: true
        type: string
      ort-version:
        description: The version of ONNX Runtime to build.
        required: true
        type: string

    secrets:
      CIPROXY_MASTER_TOKEN:
        description: The master token for ciproxy.
        required: false

permissions: {}

jobs:
  build-ort-vcpkg-ubuntu-x64:
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    environment: ${{ inputs.environment }}

    permissions:
      attestations: write
      contents: read
      id-token: write

    env:
      CLEAN_BASH_ENV: '${{ github.workspace }}/.github/scripts/clean-env-ubuntu.bash'
      FILTERED_PATH: '/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin'

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version-file: .python-version
          pip-install: -r requirements-build.txt

      # ASSERT: The directory of python3 executable is always prepended to the PATH specified in the env section.

      - name: Set up Go for ciproxy
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: .github/actions/ciproxy/cmd/go.mod
          cache-dependency-path: .github/actions/ciproxy/cmd/go.sum

      # ASSERT: The directory of go executable is always prepended to the PATH specified in the env section.

      - name: Print CMake version on Ubuntu
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        env:
          PATH: '${{ env.FILTERED_PATH }}'
        run: |
          cmake --version

      - name: Print Ninja version on Ubuntu
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        env:
          PATH: '${{ env.FILTERED_PATH }}'
        run: |
          ninja --version

      - name: Start ciproxy
        id: ciproxy
        if: github.ref == 'refs/heads/main'
        uses: ./.github/actions/ciproxy/start
        with:
          ciproxy-master-token: ${{ secrets.CIPROXY_MASTER_TOKEN }}

      - name: Checkout ONNX Runtime
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: microsoft/onnxruntime
          ref: ${{ inputs.ort-version }}
          persist-credentials: false
          path: .deps_vendor/onnxruntime
          submodules: recursive

      - name: Patch ONNX Runtime
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        env:
          GIT_CONFIG_PARAMETERS: "'user.name=github-actions[bot]' 'user.email=41898282+github-actions[bot]@users.noreply.github.com'"
        run: |
          for patch in scripts/ort_patches/*.patch; do
            git -C .deps_vendor/onnxruntime am --no-gpg-sign --3way "../../${patch}"
          done

      - name: Build vcpkg of ONNX Runtime on Ubuntu
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        env:
          BASH_ENV: '${{ env.CLEAN_BASH_ENV }}'
          PATH: '${{ env.FILTERED_PATH }}'
          VCPKG_BINARY_SOURCES: ${{ steps.ciproxy.outputs.VCPKG_BINARY_SOURCES || inputs.VCPKG_BINARY_SOURCES }}
        run: |
          ./scripts/build_ort_ubuntu.sh run_build_py x86_64 update

      - name: Stop ciproxy and upload binary packages
        if: github.ref == 'refs/heads/main'
        uses: ./.github/actions/ciproxy/finalize
        with:
          ciproxy-master-token: ${{ secrets.CIPROXY_MASTER_TOKEN }}
          pid: ${{ steps.ciproxy.outputs.PID }}

      - name: Upload ciproxy logs
        if: github.ref == 'refs/heads/main' && always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ciproxy-logs-${{ github.job }}-${{ inputs.job-index }}
          path: |
            ${{ steps.ciproxy.outputs.STDOUT_LOG }}
            ${{ steps.ciproxy.outputs.STDERR_LOG }}
          if-no-files-found: warn
