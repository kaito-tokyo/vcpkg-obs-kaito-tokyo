# author: Kaito Udagawa <umireon@kaito.tokyo>
# date: 2026-05-25

on:
  workflow_call:
    inputs:
      job-index:
        description: The job index for logging.
        required: true
        type: number
      environment:
        description: The environment name for this workflow, or empty string for no environment
        required: true
        type: string
      VCPKG_VERSION:
        description: Default VCPKG_BINARY_SOURCES.
        required: true
        type: string
      VCPKG_BINARY_SOURCES:
        description: Default VCPKG_BINARY_SOURCES.
        required: true
        type: string
      ORT_VERSION:
        description: The version of ONNX Runtime to build.
        required: true
        type: string

    secrets:
      CIPROXY_MASTER_TOKEN:
        description: The master token for ciproxy.
        required: false

permissions: {}

jobs:
  build-ort-vcpkg-ubuntu-x64:
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    environment: ${{ inputs.environment }}

    permissions:
      attestations: write
      contents: read
      id-token: write

    env:
      MINIMAL_PATH: '/usr/bin:/bin:/usr/sbin:/sbin'
      ORT_VERSION: '${{ inputs.ORT_VERSION }}'
      VCPKG_VERSION: '${{ inputs.VCPKG_VERSION }}'

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Checkout vcpkg
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: microsoft/vcpkg
          ref: ${{ env.VCPKG_VERSION }}
          persist-credentials: false
          path: vcpkg
          filter: blob:none

      - name: Checkout ONNX Runtime
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: microsoft/onnxruntime
          ref: ${{ env.ORT_VERSION }}
          persist-credentials: false
          path: onnxruntime
          submodules: recursive

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version-file: .python-version
          pip-install: -r requirements-build.txt

      - name: Set up Go for ciproxy
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: .github/actions/ciproxy/cmd/go.mod
          cache-dependency-path: .github/actions/ciproxy/cmd/go.sum

      - name: Set up vcpkg using Bash
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        run: |
          ./vcpkg/bootstrap-vcpkg.sh -disableMetrics

      - name: Set up vcpkg toolchains using Bash
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        env:
          VCPKG_ROOT: '${{ github.workspace }}/vcpkg'
        run: |
          export PATH=/usr/bin:/bin:/usr/sbin:/sbin

          CMAKE_EXE="$(./vcpkg/vcpkg fetch cmake | tail -n 1)"
          NINJA_EXE="$(./vcpkg/vcpkg fetch ninja | tail -n 1)"

          printf 'CMAKE_DIR=%s\n' "${CMAKE_EXE%/*}" >> "$GITHUB_ENV"
          printf 'NINJA_DIR=%s\n' "${NINJA_EXE%/*}" >> "$GITHUB_ENV"

          "$CMAKE_EXE" --version
          "$NINJA_EXE" --version

      - name: Patch ONNX Runtime
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        run: |
          patches=(scripts/ort_patches/*.patch)
          for patch in "${patches[@]}"; do
            git -C onnxruntime apply "../$patch"
          done

      - name: Start ciproxy
        id: ciproxy
        if: github.ref == 'refs/heads/main'
        uses: ./.github/actions/ciproxy/start
        with:
          ciproxy-master-token: ${{ secrets.CIPROXY_MASTER_TOKEN }}

      - name: Build vcpkg of ONNX Runtime on Ubuntu
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        env:
          PYTHON_EXE: ${{ steps.setup-python.outputs.python-path }}
          VCPKG_BINARY_SOURCES: '${{ steps.ciproxy.outputs.VCPKG_BINARY_SOURCES || inputs.VCPKG_BINARY_SOURCES }}'
        run: |
          vars=(
            HOME="$HOME"
            PATH="${PYTHON_EXE%/*}:$CMAKE_DIR:$NINJA_DIR:$MINIMAL_PATH"
            VCPKG_BINARY_SOURCES="$VCPKG_BINARY_SOURCES"
            VCPKG_INSTALLATION_ROOT="$GITHUB_WORKSPACE/vcpkg"
          )
          env -i "${vars[@]}" ./scripts/build_ort_ubuntu.sh run_build_py x86_64 update

      - name: Stop ciproxy and upload binary packages
        if: github.ref == 'refs/heads/main'
        uses: ./.github/actions/ciproxy/finalize
        with:
          ciproxy-master-token: ${{ secrets.CIPROXY_MASTER_TOKEN }}
          pid: ${{ steps.ciproxy.outputs.PID }}

      - name: Upload ciproxy logs
        if: github.ref == 'refs/heads/main' && always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ciproxy-logs-${{ github.job }}-${{ inputs.job-index }}
          path: |
            ${{ steps.ciproxy.outputs.STDOUT_LOG }}
            ${{ steps.ciproxy.outputs.STDERR_LOG }}
          if-no-files-found: warn
