name: Prettier

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  Prettier:
    runs-on: ubuntu-24.04

    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: cloudflare/.node-version

      - name: Run Prettier
        working-directory: cloudflare
        run: npx prettier --check .
