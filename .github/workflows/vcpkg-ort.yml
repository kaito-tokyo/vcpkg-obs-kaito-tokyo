name: Vcpkg ORT CI

# file: .github/workflows/vcpkg-ort.yml
# author: Kaito Udagawa <umireon@kaito.tokyo>
# date: 2026-05-25

on:
  push:
    branches: [main]
  merge_group:
  pull_request:
    branches: [main]
  schedule:
    - cron: 23 9 * * *
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  config:
    permissions: {}
    outputs:
      VCPKG_BINARY_SOURCES: ${{ steps.config.outputs.VCPKG_BINARY_SOURCES }}
      VCPKG_VERSION: ${{ steps.config.outputs.VCPKG_VERSION }}
      ORT_VERSION_JSON: ${{ steps.config.outputs.ORT_VERSION_JSON }}
    runs-on: ubuntu-slim
    steps:
      - name: Output config
        id: config
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        run: |
          echo 'ORT_VERSION_JSON=["v1.23.2"]' >> "${GITHUB_OUTPUT}"
          echo 'VCPKG_BINARY_SOURCES=clear;http,https://vcpkg-obs.kaito.tokyo/{name}/{version}/{sha},read' >> "${GITHUB_OUTPUT}"
          echo 'VCPKG_VERSION=2026.04.27' >> "${GITHUB_OUTPUT}"

  vcpkg-ort-windows:
    needs: config
    strategy:
      fail-fast: false
      matrix:
        ort-version: ${{ fromJSON(needs.config.outputs.ORT_VERSION_JSON) }}
    name: ORT ${{ matrix.ort-version }} on Windows x64
    permissions:
      attestations: write
      contents: read
      id-token: write
    uses: ./.github/workflows/vcpkg-ort-windows.yml
    with:
      job-index: ${{ strategy.job-index }}
      environment: ${{ github.ref == 'refs/heads/main' && 'production' || '' }}
      VCPKG_VERSION: ${{ needs.config.outputs.VCPKG_VERSION }}
      VCPKG_BINARY_SOURCES: ${{ needs.config.outputs.VCPKG_BINARY_SOURCES }}
      ORT_VERSION: ${{ matrix.ort-version }}
      ORT_OVERLAY_TRIPLET_DIR: nortti
    secrets: inherit

  vcpkg-ort-macos:
    needs: config
    strategy:
      fail-fast: false
      matrix:
        osx-arch: [arm64, x86_64]
        ort-version: ${{ fromJSON(needs.config.outputs.ORT_VERSION_JSON) }}
        os-xcode:
          - name: Sequoia, Xcode 16.4
            runs-on: macos-15
            DEVELOPER_DIR: /Applications/Xcode_16.4.app
          - name: Tahoe, Xcode 26.4
            runs-on: macos-26
            DEVELOPER_DIR: /Applications/Xcode_26.4.app
    name: ORT ${{ matrix.ort-version }} on macOS ${{ matrix.osx-arch }} with ${{ matrix.os-xcode.name }}
    permissions:
      attestations: write
      contents: read
      id-token: write
    uses: ./.github/workflows/vcpkg-ort-macos.yml
    with:
      job-index: ${{ strategy.job-index }}
      environment: ${{ github.ref == 'refs/heads/main' && 'production' || '' }}
      runs-on: ${{ matrix.os-xcode.runs-on }}
      OSX_ARCH: ${{ matrix.osx-arch }}
      DEVELOPER_DIR: ${{ matrix.os-xcode.DEVELOPER_DIR }}
      OSX_DEPLOYMENT_TARGET: '12.0'
      VCPKG_VERSION: ${{ needs.config.outputs.VCPKG_VERSION }}
      VCPKG_BINARY_SOURCES: ${{ needs.config.outputs.VCPKG_BINARY_SOURCES }}
      ORT_VERSION: ${{ matrix.ort-version }}
      ORT_OVERLAY_TRIPLET_DIR: nortti
    secrets: inherit

  vcpkg-ort-ubuntu:
    needs: config
    strategy:
      fail-fast: false
      matrix:
        ort-version: ${{ fromJSON(needs.config.outputs.ORT_VERSION_JSON) }}
    name: ORT ${{ matrix.ort-version }} on Ubuntu x64
    permissions:
      attestations: write
      contents: read
      id-token: write
    uses: ./.github/workflows/vcpkg-ort-ubuntu.yml
    with:
      job-index: ${{ strategy.job-index }}
      environment: ${{ github.ref == 'refs/heads/main' && 'production' || '' }}
      VCPKG_VERSION: ${{ needs.config.outputs.VCPKG_VERSION }}
      VCPKG_BINARY_SOURCES: ${{ needs.config.outputs.VCPKG_BINARY_SOURCES }}
      ORT_VERSION: ${{ matrix.ort-version }}
      ORT_OVERLAY_TRIPLET_DIR: nortti
    secrets: inherit

  accept-vcpkg-ort:
    needs: [vcpkg-ort-windows, vcpkg-ort-macos, vcpkg-ort-ubuntu]
    name: Accept vcpkg-ort
    runs-on: ubuntu-slim
    permissions: {}
    steps:
      - name: Accept vcpkg-ort
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        run: |
          echo 'The workflow vcpkg-ort has completed successfully.'
