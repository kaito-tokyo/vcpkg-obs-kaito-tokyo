name: Vcpkg ORT CI

# file: .github/workflows/vcpkg-ort.yml
# author: Kaito Udagawa <umireon@kaito.tokyo>
# date: 2026-06-18

on:
  push:
    branches: [main]
  merge_group:
  pull_request:
    branches: [main]
  schedule:
    - cron: 23 9 * * *
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  config:
    uses: ./.github/workflows/workflow-config.yml

  vcpkg-ort-windows:
    needs: config
    strategy:
      fail-fast: false
      matrix:
        ort-version: ${{ fromJSON(fromJSON(needs.config.outputs.configJson).ORT_VERSION_JSON) }}
    name: ORT ${{ matrix.ort-version }} on Windows x64
    permissions:
      attestations: write
      contents: read
      id-token: write
    uses: ./.github/workflows/vcpkg-ort-windows.yml
    with:
      job-index: ${{ strategy.job-index }}
      environment: ${{ github.ref == 'refs/heads/main' && 'production' || '' }}
      WINDOWS_SDK_VERSION: ${{ fromJSON(needs.config.outputs.configJson).WINDOWS_SDK_VERSION }}
      VCPKG_VERSION: ${{ fromJSON(needs.config.outputs.configJson).VCPKG_VERSION }}
      VCPKG_BINARY_SOURCES: ${{ fromJSON(needs.config.outputs.configJson).VCPKG_BINARY_SOURCES }}
      ORT_VERSION: ${{ matrix.ort-version }}
    secrets: inherit

  vcpkg-ort-macos:
    needs: config
    strategy:
      fail-fast: false
      matrix:
        osx-arch: [arm64, x86_64]
        ort-version: ${{ fromJSON(fromJSON(needs.config.outputs.configJson).ORT_VERSION_JSON) }}
        os-xcode:
          - name: Sequoia, Xcode 16.4
            runs-on: macos-15
            DEVELOPER_DIR: /Applications/Xcode_16.4.app
    name: ORT ${{ matrix.ort-version }} on macOS ${{ matrix.osx-arch }} with ${{ matrix.os-xcode.name }}
    permissions:
      attestations: write
      contents: read
      id-token: write
    uses: ./.github/workflows/vcpkg-ort-macos.yml
    with:
      job-index: ${{ strategy.job-index }}
      environment: ${{ github.ref == 'refs/heads/main' && 'production' || '' }}
      runs-on: ${{ matrix.os-xcode.runs-on }}
      DEVELOPER_DIR: ${{ matrix.os-xcode.DEVELOPER_DIR }}
      OSX_ARCHITECTURES: ${{ matrix.osx-arch }}
      OSX_DEPLOYMENT_TARGET: '12.0'
      VCPKG_VERSION: ${{ fromJSON(needs.config.outputs.configJson).VCPKG_VERSION }}
      VCPKG_BINARY_SOURCES: ${{ fromJSON(needs.config.outputs.configJson).VCPKG_BINARY_SOURCES }}
      ORT_VERSION: ${{ matrix.ort-version }}
    secrets: inherit

  vcpkg-ort-ubuntu:
    needs: config
    strategy:
      fail-fast: false
      matrix:
        ort-version: ${{ fromJSON(fromJSON(needs.config.outputs.configJson).ORT_VERSION_JSON) }}
    name: ORT ${{ matrix.ort-version }} on Ubuntu x64
    permissions:
      attestations: write
      contents: read
      id-token: write
    uses: ./.github/workflows/vcpkg-ort-ubuntu.yml
    with:
      job-index: ${{ strategy.job-index }}
      environment: ${{ github.ref == 'refs/heads/main' && 'production' || '' }}
      VCPKG_VERSION: ${{ fromJSON(needs.config.outputs.configJson).VCPKG_VERSION }}
      VCPKG_BINARY_SOURCES: ${{ fromJSON(needs.config.outputs.configJson).VCPKG_BINARY_SOURCES }}
      ORT_VERSION: ${{ matrix.ort-version }}
    secrets: inherit

  accept-vcpkg-ort:
    needs: [vcpkg-ort-windows, vcpkg-ort-macos, vcpkg-ort-ubuntu]
    name: Accept vcpkg-ort
    runs-on: ubuntu-slim
    permissions: {}
    steps:
      - name: Accept vcpkg-ort
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        run: |
          echo 'The workflow vcpkg-ort has completed successfully.'
