name: Vcpkg ORT CI

# file: .github/workflows/vcpkg-ort.yml
# author: Kaito Udagawa <umireon@kaito.tokyo>
# date: 2026-06-18

on:
  push:
    branches: [main]
  merge_group:
  pull_request:
    branches: [main]
  schedule:
    - cron: 23 9 * * *
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci-config:
    permissions:
      contents: read
    uses: ./.github/workflows/ci-config.yml

  vcpkg-ort-windows:
    needs: ci-config
    name: Vcpkg ORT Windows
    permissions:
      attestations: write
      contents: read
      id-token: write
    uses: ./.github/workflows/vcpkg-ort-windows.yml
    with:
      job-index: 0
      environment: ${{ github.ref == 'refs/heads/main' && 'production' || '' }}
      WINDOWS_SDK_VERSION: ${{ needs.ci-config.outputs.WINDOWS_SDK_VERSION }}
      VCPKG_VERSION: ${{ needs.ci-config.outputs.VCPKG_VERSION }}
      ORT_VERSION: ${{ needs.ci-config.outputs.ORT_VERSION }}
      VCPKG_BINARY_SOURCES: ${{ needs.ci-config.outputs.VCPKG_BINARY_SOURCES }}
    secrets: inherit

  vcpkg-ort-macos:
    needs: ci-config
    name: Vcpkg ORT macOS
    strategy:
      fail-fast: false
      matrix:
        osx-arch: [arm64, x86_64]
    permissions:
      attestations: write
      contents: read
      id-token: write
    uses: ./.github/workflows/vcpkg-ort-macos.yml
    with:
      job-index: ${{ strategy.job-index }}
      environment: ${{ github.ref == 'refs/heads/main' && 'production' || '' }}
      runs-on: macos-15
      DEVELOPER_DIR: /Applications/Xcode_16.4.app
      OSX_ARCHITECTURES: ${{ matrix.osx-arch }}
      OSX_DEPLOYMENT_TARGET: ${{ needs.ci-config.outputs.OSX_DEPLOYMENT_TARGET }}
      VCPKG_VERSION: ${{ needs.ci-config.outputs.VCPKG_VERSION }}
      ORT_VERSION: ${{ needs.ci-config.outputs.ORT_VERSION }}
      VCPKG_BINARY_SOURCES: ${{ needs.ci-config.outputs.VCPKG_BINARY_SOURCES }}
    secrets: inherit

  accept-vcpkg-ort:
    needs:
      - vcpkg-ort-windows
      - vcpkg-ort-macos
    name: Accept vcpkg-ort
    runs-on: ubuntu-slim
    permissions: {}
    env:
      VCPKG_ORT_WINDOWS_RESULT: ${{ needs.vcpkg-ort-windows.result }}
      VCPKG_ORT_MACOS_RESULT: ${{ needs.vcpkg-ort-macos.result }}
    steps:
      - name: Accept vcpkg-ort
        shell: bash --noprofile --norc -euo pipefail -O nullglob {0}
        run: |
          [[ "$VCPKG_ORT_WINDOWS_RESULT" == 'success' ]] && [[ "$VCPKG_ORT_MACOS_RESULT" == 'success' ]]
